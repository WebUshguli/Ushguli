<!DOCTYPE html>
<html lang="en" data-season="summer">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Enguri Tower - Cuisine of the Georgian highlands."
    />
    <title>Enguri Tower | Cuisine of the Highlands</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500&family=Noto+Sans+Georgian:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="navbar" id="navbar">
      <div class="nav-container">
        <a href="#home" class="brand">
          <span class="brand-name">
            <span class="lang-en">HOME</span>
            <span class="lang-ka">მთავარი</span>
          </span>
        </a>

        <nav class="nav-links" id="navLinks">
          <a href="menu.html">
            <span class="lang-en">Menu</span>
            <span class="lang-ka">მენიუ</span>
          </a>
          <a href="contact.html">
            <span class="lang-en">Contact</span>
            <span class="lang-ka">კონტაქტი</span>
          </a>
          <div class="season-toggle" role="group" aria-label="Season">
            <button class="season-btn active" data-season="summer" aria-pressed="true" title="Summer" aria-label="Summer">&#9728;</button>
            <span class="lang-sep">|</span>
            <button class="season-btn" data-season="winter" aria-pressed="false" title="Winter" aria-label="Winter">&#10052;</button>
          </div>
        </nav>

        <button
          class="nav-toggle"
          id="navToggle"
          aria-label="Toggle navigation"
          aria-expanded="false"
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>

      <div class="hero-lang-toggle lang-toggle" role="group" aria-label="Language">
        <button type="button" class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
        <span class="lang-sep">|</span>
        <button type="button" class="lang-btn" data-lang="ka" aria-pressed="false">KA</button>
      </div>
    </header>

    <main>
      <section class="hero" id="home">
        <div class="hero-overlay"></div>
        <div class="snow-field" id="snowField" aria-hidden="true"></div>

        <div class="hero-content">
          <p class="eyebrow">
            <span class="lang-en">Svaneti &middot; Georgia</span>
            <span class="lang-ka">სვანეთი &middot; საქართველო</span>
          </p>
          <h1 class="hero-title">ENGURI</h1>
          <span class="hero-sub-label">TOWER</span>
        </div>

        <div class="hero-menu-btns">
          <a href="menu.html" class="hero-menu-btn hero-frosted-btn" aria-label="Menu">
            <span class="hero-menu-btn-label hero-frosted-label">
              <span class="lang-en">MENU</span>
              <span class="lang-ka">მენიუ</span>
            </span>
          </a>
        </div>

        <div class="hero-social-btns">
          <a href="contact.html" class="hero-menu-btn hero-frosted-btn" aria-label="Contact">
            <span class="hero-menu-btn-label hero-frosted-label">
              <span class="lang-en">CONTACT</span>
              <span class="lang-ka">კონტაქტი</span>
            </span>
          </a>
        </div>
      </section>

      <section class="contact tagline-section">
        <div class="container">
          <div class="contact-info contact-centered">
            <h2 class="section-title">
              <span class="lang-en">The place you keep coming back to.</span>
              <span class="lang-ka">ადგილი, სადაც ყოველთვის ბრუნდები.</span>
            </h2>
            <span class="rule"></span>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer footer-slim">
      <div class="container">
        <div class="footer-bottom">
          <p class="copy">&copy; <span id="year"></span> &middot; Enguri Tower</p>
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
